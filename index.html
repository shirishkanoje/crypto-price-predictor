<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoinHub Predictor</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">
  <h1>🔎 Crypto Predictor</h1>

  <input id="search" placeholder="Search coin..." />
  <ul id="suggestions"></ul>

  <div class="chart-box">
    <canvas id="actualChart"></canvas>
  </div>

  <button onclick="generatePrediction()">Predict 30 Days</button>

  <div class="chart-box">
    <canvas id="predictedChart"></canvas>
  </div>

  <div id="report"></div>
</div>

<script src="script.js"></script>
</body>
</html>
